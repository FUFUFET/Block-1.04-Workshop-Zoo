<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fullstack Zoo</title>
  </head>
  <body>
    <main>
      <h1>Welcome to Fullstack Zoo</h1>
      <section aria-label="Dog">
        <!-- aira-label is added because the section element needs an accessible name otherwise screen reader will read it as generic element.  -->
        <h2>Dog</h2>
        <img
          src="https://images.unsplash.com/photo-1692003122872-6400308772d5?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Australian shepherd"
        />
        <ul>
          <li>Obi</li>
          <li>Maru</li>
          <li>Ken</li>
        </ul>
      </section>
      <section aria-label="Cat">
        <h2>Cat</h2>
        <img
          src="https://images.unsplash.com/photo-1609918484294-4e327f952332?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="cat"
        />
        <ul>
          <li>Obi</li>
          <li>Maru</li>
          <li>Ken</li>
        </ul>
      </section>
    </main>
  </body>
</html>
